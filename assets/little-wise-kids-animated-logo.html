<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Little Wise Kids — animated SVG logo</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  html, body { min-height: 100%; margin: 0; }
  body {
    display: grid;
    place-items: center;
    padding: clamp(18px, 4vw, 56px);
    background: transparent;
  }
  .logo-wrap { width: min(1120px, 100%); }
  svg { display: block; width: 100%; height: auto; overflow: visible; }

  /* Faster, more responsive cycle: immediate writing, quick reveal, then a gentle pause. */
  .hand {
    transform-box: fill-box; transform-origin: 50% 50%;
    animation: hand-in 6.2s cubic-bezier(.2,.72,.22,1) infinite;
  }
  .child {
    transform-box: fill-box; transform-origin: 50% 85%;
    animation: child-in 6.2s cubic-bezier(.18,.72,.24,1) infinite;
  }
  .star { transform-box: fill-box; transform-origin: center; }
  .star-a { animation: star-a 6.2s ease-in-out infinite; }
  .star-b { animation: star-b 6.2s ease-in-out infinite; }
  .star-c { animation: star-c 6.2s ease-in-out infinite; }

  .ink {
    fill: none;
    stroke: #fff;
    stroke-linecap: round;
    stroke-linejoin: round;
    pathLength: 1;
    stroke-dasharray: 1;
    stroke-dashoffset: 1;
  }
  .little-ink { animation: write-little 6.2s cubic-bezier(.46,.02,.2,1) infinite; }
  .wise-ink { animation: write-wise 6.2s cubic-bezier(.46,.02,.2,1) infinite; }
  .kids-ink { animation: write-kids 6.2s cubic-bezier(.46,.02,.2,1) infinite; }

  .full-little { animation: full-little 6.2s ease infinite; }
  .full-wise { animation: full-wise 6.2s ease infinite; }
  .full-kids { animation: full-kids 6.2s ease infinite; }

  .logo-finish {
    transform-box: view-box; transform-origin: 50% 50%;
    animation: finish-settle 6.2s cubic-bezier(.22,.74,.22,1) infinite;
  }

  @keyframes hand-in {
    0%, 1% { opacity:0; transform:translate(-34px,26px) rotate(-2.2deg) scale(.975); }
    8.5% { opacity:1; transform:translate(2px,-1px) rotate(.2deg) scale(1.006); }
    10.5%,100% { opacity:1; transform:none; }
  }
  @keyframes child-in {
    0%, 1.5% { opacity:0; transform:translate(10px,-28px) rotate(1.8deg) scale(.982); }
    9.3% { opacity:1; transform:translate(-1px,2px) rotate(-.18deg) scale(1.005); }
    11.2%,100% { opacity:1; transform:none; }
  }
  @keyframes star-a {
    0%,4% { opacity:0; transform:translate(-9px,13px) scale(.72) rotate(-12deg); }
    10% { opacity:1; transform:translate(1px,-1px) scale(1.04) rotate(2deg); }
    12%,73% { opacity:1; transform:none; }
    76% { opacity:.82; transform:scale(.95) rotate(-2deg); }
    79%,100% { opacity:1; transform:none; }
  }
  @keyframes star-b {
    0%,5% { opacity:0; transform:translate(2px,14px) scale(.74) rotate(10deg); }
    11% { opacity:1; transform:translate(-1px,-1px) scale(1.04) rotate(-2deg); }
    13%,77% { opacity:1; transform:none; }
    80% { opacity:.84; transform:scale(.96) rotate(2deg); }
    83%,100% { opacity:1; transform:none; }
  }
  @keyframes star-c {
    0%,6% { opacity:0; transform:translate(10px,9px) scale(.72) rotate(-8deg); }
    12% { opacity:1; transform:translate(-1px,1px) scale(1.035) rotate(1deg); }
    14%,81% { opacity:1; transform:none; }
    84% { opacity:.83; transform:scale(.95) rotate(-2deg); }
    87%,100% { opacity:1; transform:none; }
  }

  @keyframes write-little {
    0% { stroke-dashoffset:1; }
    18% { stroke-dashoffset:0; }
    100% { stroke-dashoffset:0; }
  }
  @keyframes write-wise {
    0%,8% { stroke-dashoffset:1; }
    28% { stroke-dashoffset:0; }
    100% { stroke-dashoffset:0; }
  }
  @keyframes write-kids {
    0%,18% { stroke-dashoffset:1; }
    38% { stroke-dashoffset:0; }
    100% { stroke-dashoffset:0; }
  }
  @keyframes full-little { 0%,16% {opacity:0} 18%,100% {opacity:1} }
  @keyframes full-wise { 0%,26% {opacity:0} 28%,100% {opacity:1} }
  @keyframes full-kids { 0%,36% {opacity:0} 38%,100% {opacity:1} }
  @keyframes finish-settle {
    0%,39% { transform:none; }
    42% { transform:scale(1.004); }
    45%,100% { transform:none; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation: none !important; }
    .ink { stroke-dashoffset: 0; }
    .full-little,.full-wise,.full-kids,.hand,.child,.star { opacity:1; transform:none; }
  }
</style>
