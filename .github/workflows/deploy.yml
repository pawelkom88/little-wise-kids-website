name: Deploy to Cloudflare

permissions:
  contents: read

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [sanity-publish]

jobs:
  deploy:
    if: >-
      github.event_name == 'push' ||
      (github.event.action == 'sanity-publish' &&
       github.event.client_payload.source == 'sanity-gateway' &&
       github.event.client_payload.projectId == 'c10vla3h' &&
       github.event.client_payload.dataset == 'production')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          SANITY_DATASET: production
          SANITY_PROJECT_ID: c10vla3h
          WEB3FORMS_ACCESS_KEY: ${{ secrets.WEB3FORMS_ACCESS_KEY }}
      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: f5f7a459dda6bb174707e369bd5cd770
          command: deploy
